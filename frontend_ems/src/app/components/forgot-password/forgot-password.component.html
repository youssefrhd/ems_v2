<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="flex font-poppins items-center justify-center">
    <div class="h-screen w-screen flex justify-center items-center dark:bg-gray-900">
      <!-- Dark Mode Toggle Button -->
      <button
      class="absolute top-4 right-4 p-2 rounded-full bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors"
      (click)="toggleTheme()"
    >
      <span class="text-gray-800 dark:text-gray-200">
        {{ isDarkTheme ? '☀️':'🌙'}}
      </span>
    </button>

      <!-- Card -->
      <div class="grid gap-8">
        <div
          id="back-div"
          class="bg-gradient-to-r from-blue-500 to-purple-500 rounded-[26px] m-4"
        >
          <div
            class="border-[20px] border-transparent rounded-[20px] dark:bg-gray-900 bg-white shadow-lg xl:p-10 2xl:p-10 lg:p-10 md:p-10 sm:p-2 m-2"
          >
            <h1 class="pt-8 pb-6 font-bold dark:text-gray-400 text-5xl text-center cursor-default">
              Forgot Password?
            </h1>
            <p class="text-sm text-center text-gray-600 dark:text-gray-400 mb-6">
              Enter your email to get a reset link
            </p>

            <!-- Form -->
            <form class="space-y-6" [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()">
              
              <div>
                <label for="email" class="mb-2 dark:text-gray-400 text-lg">Your email</label>
                <input
                  id="email"
                  formControlName="email"
                  type="email"
                  placeholder="me@example.com"
                  class="border p-3 dark:bg-indigo-700 dark:text-gray-300 dark:border-gray-700 shadow-md placeholder:text-base focus:scale-105 ease-in-out duration-300 border-gray-300 rounded-lg w-full"
                  required
                />
                <div *ngIf="resetMessage" class="text-sm text-red-500 mt-1 hidden">
                  {{resetMessage}}
                </div>
              </div>

              <!-- Actions -->
              <div class="flex items-center justify-between">
                <a
                  href="#"
                  class="group text-blue-400 transition-all duration-100 ease-in-out"
                >
                  <span
                    class="bg-left-bottom bg-gradient-to-r from-blue-400 to-blue-400 bg-[length:0%_2px] bg-no-repeat group-hover:bg-[length:100%_2px] transition-all duration-500 ease-out"
                  >
                    ← Back to the login page
                  </span>
                </a>
                <button
                  type="submit"
                  [disabled]="forgotPasswordForm.invalid"
                  class="bg-gradient-to-r dark:text-gray-300 from-blue-500 to-purple-500 shadow-lg p-2 text-white rounded-lg hover:scale-105 hover:from-purple-500 hover:to-blue-500 transition duration-300 ease-in-out"
                >
                  Reset password
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>


  </body>
</html>
