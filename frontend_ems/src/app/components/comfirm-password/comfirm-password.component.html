<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Confirmation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
</head>

<body class="flex font-poppins items-center justify-center">
    <div class="h-screen w-screen flex justify-center items-center dark:bg-gray-900">
        <div class="grid gap-8">
            <div id="back-div" class="bg-gradient-to-r from-blue-500 to-purple-500 rounded-[26px] m-4">
                <div
                    class="border-[20px] border-transparent rounded-[20px] dark:bg-gray-900 bg-white shadow-lg xl:p-10 2xl:p-10 lg:p-10 md:p-10 sm:p-2 m-2"
                >
                    <h2 class="pt-8 pb-6 font-bold dark:text-gray-400 text-4xl text-center cursor-default">
                        Set New Password
                    </h2>

                    <form class="space-y-4" [formGroup]="confirmForm" (ngSubmit)="onSubmit()">
                        
                        <!-- New Password Field -->
                        <div>
                            <label for="password" class="mb-2 dark:text-gray-400 font-sans text-lg">New Password</label>
                            <input
                                id="password"
                                formControlName="password"
                                class="border p-3 dark:bg-indigo-700 dark:text-gray-300 dark:border-gray-700 shadow-md placeholder:text-base focus:scale-105 ease-in-out duration-300 border-gray-300 rounded-lg w-full"
                                type="password"
                                placeholder="Enter new password"
                                required
                            />
                            <small class="text-red-500" *ngIf="confirmForm.get('password')?.invalid && confirmForm.get('password')?.touched">
                                Password must be at least 8 characters
                            </small>
                        </div>

                        <!-- Confirm Password Field -->
                        <div>
                            <label for="confirm-password" class="mb-2 dark:text-gray-400 text-lg">Confirm Password</label>
                            <input
                                id="confirm-password"
                                formControlName="confirmpassword"
                                class="border p-3 dark:bg-indigo-700 dark:text-gray-300 dark:border-gray-700 shadow-md placeholder:text-base focus:scale-105 ease-in-out duration-300 border-gray-300 rounded-lg w-full"
                                type="password"
                                placeholder="Confirm new password"
                                required
                            />
                            <small class="text-red-500" *ngIf="confirmForm.hasError('passwordMismatch') && confirmForm.touched">
                                Passwords do not match
                            </small>
                        </div>

                        <!-- Submit Button -->
                        <button
                            class="bg-gradient-to-r dark:text-gray-300 from-blue-500 to-purple-500 shadow-lg mt-6 p-2 text-white rounded-lg w-full hover:scale-105 hover:from-purple-500 hover:to-blue-500 transition duration-300 ease-in-out"
                            type="submit"
                            [disabled]="confirmForm.invalid"
                        >
                            Confirm password
                        </button>
                    </form>

                    <!-- Login Link -->
                    <div class="flex flex-col mt-4 items-center justify-center text-sm">
                        <h3 class="dark:text-gray-300">
                            Remember your password?
                            <a class="group text-blue-400 transition-all duration-100 ease-in-out" href="#">
                                <span
                                    class="bg-left-bottom bg-gradient-to-r from-blue-400 to-blue-400 bg-[length:0%_2px] bg-no-repeat group-hover:bg-[length:100%_2px] transition-all duration-500 ease-out"
                                >
                                    Log In
                                </span>
                            </a>
                        </h3>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
