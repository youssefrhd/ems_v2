<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode Login Form</title>
    <style>
        
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #121212; /* Dark background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Card Gradient Effect */
        .card {
            background-image: linear-gradient(163deg, #00ff75 0%, #3700ff 100%);
            border-radius: 22px;
            transition: all 0.3s;
            width: 90%;
            max-width: 400px; /* Responsive max-width */
            margin: 20px;
        }

        /* Form Container */
        .card2 {
            border-radius: 0;
            transition: all 0.2s;
            background-color: #171717;
            padding: 1.5em;
            border-radius: 20px;
        }

        .card:hover {
            box-shadow: 0px 0px 30px 1px rgba(0, 255, 117, 0.3);
        }

        .card2:hover {
            transform: scale(0.98);
        }

        /* Form Styles */
        .form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            color: white;
        }

        #heading {
            text-align: center;
            margin: 1em 0;
            color: white;
            font-size: 1.5em;
            font-weight: 600;
        }

        /* Input Fields */
        .field {
            display: flex;
            align-items: center;
            gap: 0.8em;
            border-radius: 12px;
            padding: 0.8em;
            background-color: #252525;
            box-shadow: inset 2px 4px 8px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
        }

        .field:focus-within {
            box-shadow: 0 0 0 2px #00ff75;
        }

        .input-icon {
            height: 1.3em;
            width: 1.3em;
            fill: #d3d3d3;
        }

        .input-field {
            background: none;
            border: none;
            outline: none;
            width: 100%;
            color: white;
            font-size: 0.95em;
        }

        .input-field::placeholder {
            color: #a0a0a0;
        }

        /* Buttons */
        .btn {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 1.5em;
        }

        .button1, .button2, .button3 {
            border: none;
            outline: none;
            border-radius: 8px;
            padding: 0.8em 1.5em;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
            flex: 1; /* Equal width buttons */
            text-align: center;
        }

        .button1, .button2 {
            background-color: #3700ff;
            color: white;
        }

        .button1:hover, .button2:hover {
            background-color: #2a00c2;
            transform: translateY(-2px);
        }

        .button3 {
            background: transparent;
            color: #a0a0a0;
            margin: 0 auto;
            padding: 0.5em;
        }

        .button3:hover {
            color: #00ff75;
            text-decoration: underline;
        }

        /* Responsive Tweaks */
        @media (max-width: 480px) {
            .card {
                width: 95%;
            }
            
            .btn {
                flex-direction: column;
            }
            
            .field {
                padding: 0.7em;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card2">
            <form class="form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
                <p id="heading">Login</p>
                <div class="field">
                    <svg viewBox="0 0 16 16" fill="currentColor" height="16" width="16" xmlns="http://www.w3.org/2000/svg" class="input-icon">
                        <path d="M13.106 7.222c0-2.967-2.249-5.032-5.482-5.032-3.35 0-5.646 2.318-5.646 5.702 0 3.493 2.235 5.708 5.762 5.708.862 0 1.689-.123 2.304-.335v-.862c-.43.199-1.354.328-2.29.328-2.926 0-4.813-1.88-4.813-4.798 0-2.844 1.921-4.881 4.594-4.881 2.735 0 4.608 1.688 4.608 4.156 0 1.682-.554 2.769-1.416 2.769-.492 0-.772-.28-.772-.76V5.206H8.923v.834h-.11c-.266-.595-.881-.964-1.6-.964-1.4 0-2.378 1.162-2.378 2.823 0 1.737.957 2.906 2.379 2.906.8 0 1.415-.39 1.709-1.087h.11c.081.67.703 1.148 1.503 1.148 1.572 0 2.57-1.415 2.57-3.643zm-7.177.704c0-1.197.54-1.907 1.456-1.907.93 0 1.524.738 1.524 1.907S8.308 9.84 7.371 9.84c-.895 0-1.442-.725-1.442-1.914z"></path>
                    </svg>
                    <input type="text" class="input-field" placeholder="Username" autocomplete="off" formControlName="email"/>
                </div>
                <div class="field">
                    <svg viewBox="0 0 16 16" fill="currentColor" height="16" width="16" xmlns="http://www.w3.org/2000/svg" class="input-icon">
                        <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"></path>
                    </svg>
                    <input type="password" class="input-field" placeholder="Password" formControlName="password"/>
                </div>
                <div class="btn">
                    <button type="submit" class="button1" [disabled]="loginForm.invalid">Login</button>
                    
                </div>
                <button type="button" class="button3">Forgot Password?</button>
            </form>
        </div>
    </div>
</body>
</html>
